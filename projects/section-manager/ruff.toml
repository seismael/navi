target-version = "py312"
line-length = 99
src = ["src"]

[lint]
select = [
    "E", "W", "F", "I", "UP", "B", "SIM", "RUF", "N", "S",
    "A", "C4", "DTZ", "T20", "PT", "RET", "TCH", "PTH", "ERA",
]
ignore = [
    "S101",
    "E501",
    "W191",
    "TC001",
    "TC002",
    "TC003",
    "RUF022",
    "RUF023",
    "S112",
    "B007",
]

[lint.isort]
known-first-party = ["navi_contracts", "navi_section_manager", "navi_actor", "navi_auditor"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
